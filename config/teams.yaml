# wd-squads configuration
#
# The tool discovers the football clubs to check, then for each club compares
# the "current squad" on English Wikipedia against the membership statements
# (P54, member of sports team) on Wikidata, and reports suggested edits.

# Default Wikipedia language edition used to read squad lists. It can be
# overridden per league (see `language:` under each league below). English
# ("en") and similar editions list squads with {{fs player}} templates, while
# German ("de") uses a {{PersonZelle}} squad table; the parser handles both.
language: en

# A descriptive User-Agent is REQUIRED by the Wikimedia APIs. Please keep a
# contact URL / e-mail so operators can reach you if your bot misbehaves.
# See https://meta.wikimedia.org/wiki/User-Agent_policy
user_agent: "wd-squads/0.1 (https://github.com/metaodi/wd-squads; oderbolz@gmail.com)"

# Seconds to wait between HTTP requests, to stay polite to the APIs.
request_delay: 1.0

# ---------------------------------------------------------------------------
# Team discovery (SPARQL auto-discovery)
# ---------------------------------------------------------------------------
# Leagues are given as Wikidata Q-IDs. For each league the tool runs a SPARQL
# query that returns every team that has the league set as its `league` (P118)
# value and is an instance of `team_class` below (defaults to Q476028,
# "association football club").
#
# Each league may set its own `language:` to read squads from the Wikipedia
# edition that maintains that league best; if omitted it uses the default
# `language` above. Likewise, a league may set its own `team_class:` to
# discover a different kind of team (e.g. an ice hockey league); if omitted it
# uses the top-level `team_class:` (or the football default).
# team_class: Q476028
leagues:
  - id: Q202699        # Swiss Super League (small: good for a first run)
    label: Swiss Super League
    language: de       # Swiss clubs' squads are best kept on German Wikipedia
  - id: Q688866            # Nationalliga A
    label: National League 
    team_class: Q4498974  # ice hockey team
    language: de
  - id: Q82595         # Bundesliga (Germany)
    label: Bundesliga
    language: de
  - id: Q9448        # Premier League (England)
    label: Premier League
    language: en
  # - id: Q324867      # La Liga (Spain)
  #   language: es

# Optional: a fully custom SPARQL SELECT that returns the teams to check.
# It MUST bind ?team (a wd:Q… entity). ?teamLabel and ?article (the enwiki
# article URL) are used when present. When set, this REPLACES league discovery.
# discovery_query: |
#   SELECT ?team ?teamLabel ?article WHERE {
#     ?team wdt:P118 wd:Q9448 .
#     ?team wdt:P31/wdt:P279* wd:Q476028 .
#     OPTIONAL { ?article schema:about ?team ; schema:isPartOf <https://en.wikipedia.org/> . }
#     SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
#   }

# Optional: pin an explicit list of team Q-IDs. When set, this REPLACES both
# league discovery and discovery_query. Handy for testing a single club.
# teams:
#   - Q18500        # FC Basel
